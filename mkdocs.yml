# ============================================================
# MkDocs Configuration — agentic-arch
# ============================================================

# ------------------------------------------------------------
# 1. Site Identity
# ------------------------------------------------------------
site_name: "agentic-arch"
site_description: "A governed workspace for writing a scientific thesis with AI agents — structuring research, documentation, and agent behavior through charters, boundaries, contracts, and constitutions."
site_author: ""
site_url: ""

# repo_name: "agentic-arch"
# repo_url: "https://github.com/username/agentic-arch"
# edit_uri: "edit/main/docs/"

# ------------------------------------------------------------
# 2. Documentation Source
# ------------------------------------------------------------
docs_dir: "docs"
site_dir: "site"

# ------------------------------------------------------------
# 3. Theme & Presentation
# ------------------------------------------------------------
theme:
  name: "material"
  language: "en"
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy
    - content.code.annotate
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    primary: "indigo"
    accent: "indigo"
  font:
    text: "Inter"
    code: "JetBrains Mono"

# ------------------------------------------------------------
# 4. Custom Styling
# ------------------------------------------------------------
extra_css:
  - style/academic.css

extra_javascript: []

# ------------------------------------------------------------
# 5. Plugins
# ------------------------------------------------------------
plugins:
  - search:
      lang: en

# ------------------------------------------------------------
# 6. Markdown Extensions
# ------------------------------------------------------------
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ------------------------------------------------------------
# 7. Navigation
# ------------------------------------------------------------
nav:
  - Home: index.md
  - Lessons — Agentic AI:
      - Concepts: lessons-agentic-ai/concepts.md
      - Principles: lessons-agentic-ai/principles.md
      - Benefits: lessons-agentic-ai/benefits.md

# ------------------------------------------------------------
# 8. Extra
# ------------------------------------------------------------
extra:
  social: []
  generator: false

# ------------------------------------------------------------
# 9. Copyright
# ------------------------------------------------------------
copyright: "Copyright &copy; 2026"
